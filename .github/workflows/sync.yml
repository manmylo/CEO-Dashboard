name: Gearevo BI sync

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Force a full sync (products + 90 days), ignoring the daily flag"
        type: boolean
        default: false
      test_email:
        description: "Force-send the EmailJS report right now, ignoring the 8am MYT / once-a-day gate"
        type: boolean
        default: false
      backfill:
        description: "Backfill daily sales history from the Gearevo sales dashboard's Firestore (one-off, skips Shopify + email)"
        type: boolean
        default: false

# Triggered every ~2 min by an external cron (cron-job.org) — without this,
# a run that gets cancelled or killed mid-flight (GitHub concurrent-job
# limits, manual cancellation, etc.) leaves sync.js's own Firestore lock
# stuck, since a cancelled run never reaches the code that releases it.
# Every run for the next ~20 minutes then just silently no-ops against that
# stuck lock — reported as a misleading "success" in the Actions UI, since
# a graceful skip isn't a script error. This queues overlapping triggers
# instead: only one run is ever in flight, so nothing gets cancelled out
# from under an in-progress sync. If more triggers pile up while one run is
# already queued, only the newest queued one survives (the older, not-yet-
# started ones are superseded) — that's fine, since a not-yet-started run
# never held the Firestore lock to begin with.
concurrency:
  group: gearevo-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: sync
        run: npm install

      - name: Run sync
        working-directory: sync
        env:
          SHOP_DOMAIN: ${{ secrets.SHOP_DOMAIN }}
          SHOP_TOKEN: ${{ secrets.SHOP_TOKEN }}
          SHOP_API_VERSION: ${{ secrets.SHOP_API_VERSION }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          FORCE_FULL: ${{ github.event.inputs.full }}
          FORCE_EMAIL: ${{ github.event.inputs.test_email }}
          FORCE_BACKFILL: ${{ github.event.inputs.backfill }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: npm run sync
