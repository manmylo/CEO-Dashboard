name: Gearevo BI sync

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Force a full sync (products + 90 days), ignoring the daily flag"
        type: boolean
        default: false
      test_email:
        description: "Force-send the EmailJS report right now, ignoring the 8am MYT / once-a-day gate"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: sync
        run: npm install

      - name: Run sync
        working-directory: sync
        env:
          SHOP_DOMAIN: ${{ secrets.SHOP_DOMAIN }}
          SHOP_TOKEN: ${{ secrets.SHOP_TOKEN }}
          SHOP_API_VERSION: ${{ secrets.SHOP_API_VERSION }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          MONTHLY_TARGET: ${{ secrets.MONTHLY_TARGET }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          FORCE_FULL: ${{ github.event.inputs.full }}
          FORCE_EMAIL: ${{ github.event.inputs.test_email }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: npm run sync
